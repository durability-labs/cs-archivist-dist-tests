services:
  dist-test-run:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      - ARCHIVISTDOCKERIMAGE=durabilitylabs/archivist-node:latest-dist-tests
      - BRANCH="fix/release-tests-ci"
      - KUBECONFIG=/opt/kubeconfig
      - LOGPATH=/opt/logs
      - RUNNERLOCATION=ExternalToCluster
