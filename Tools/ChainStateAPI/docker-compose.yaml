services:
  chainstateapi:
    build:
      context: ../..
      dockerfile: ./Tools/ChainStateAPI/Dockerfile
    environment:
      DBHOST: postgres_chainstate
      DBLOGIN: chainstate
      DBPASSWORD: chainstatepw
      ARCHIVIST_NETWORK: devnet
      ARCHIVIST_VERSION: latest
      DATADIR: /data
      LOGDEBUG: 1
    depends_on:
      postgres_chainstate:
        condition: service_healthy
    volumes:
      - chainstate_data:/data

  postgres_chainstate:
    image: postgres:16
    environment:
      POSTGRES_USER: chainstate
      POSTGRES_PASSWORD: chainstatepw
      POSTGRES_DB: chainstatedb
    # ports:
    #   - 5432:5432
    volumes:
      - postgres_chainstate_data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U chainstate -d chainstatedb
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  postgres_chainstate_data:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ./docker/database

  chainstate_data:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ./docker/data
