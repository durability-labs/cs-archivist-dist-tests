name: Run Release Tests


on:
  workflow_dispatch:
    inputs:
      archivistdockerimage:
        description: "Archivist Docker image (example: 'durabilitylabs/archivist-node:0.0.1-dist-tests')"
        required: true
        type: string
      runner_image:
        description: Runner image for the release-test job pod
        required: false
        type: string
      runner_image_pull_policy:
        description: Pull policy for the release-test job pod image
        required: false
        type: string
      image_pull_policy:
        description: Default pull policy for child test deployments
        required: false
        type: string
      archivist_image_pull_policy:
        description: Pull policy override for Archivist node deployments
        required: false
        type: string
      archivist_contracts_image:
        description: Contracts image override
        required: false
        type: string
      archivist_contracts_image_pull_policy:
        description: Pull policy override for contracts deployments
        required: false
        type: string
      geth_docker_image:
        description: Geth image override
        required: false
        type: string
      geth_image_pull_policy:
        description: Pull policy override for geth deployments
        required: false
        type: string
      prometheus_docker_image:
        description: Prometheus image override
        required: false
        type: string
      prometheus_image_pull_policy:
        description: Pull policy override for Prometheus deployments
        required: false
        type: string
      archivist_discordbot_image:
        description: Discord bot image override
        required: false
        type: string
      archivist_discordbot_image_pull_policy:
        description: Pull policy override for Discord bot deployments
        required: false
        type: string
      archivist_rewarderbot_image:
        description: Rewarder bot image override
        required: false
        type: string
      archivist_rewarderbot_image_pull_policy:
        description: Pull policy override for rewarder bot deployments
        required: false
        type: string
      namespace:
        description: Kubernetes namespace for test jobs
        required: false
        type: string
        default: 'devnet'
  workflow_call:
    inputs:
      source:
        description: Repository with tests (current)
        required: false
        type: string
      branch:
        description: Branch with tests (main)
        required: false
        type: string
      archivistdockerimage:
        description: "Archivist Docker image (example: 'durabilitylabs/archivist-node:0.0.1-dist-tests')"
        required: true
        type: string
      runner_image:
        description: Runner image for the release-test job pod
        required: false
        type: string
      runner_image_pull_policy:
        description: Pull policy for the release-test job pod image
        required: false
        type: string
      image_pull_policy:
        description: Default pull policy for child test deployments
        required: false
        type: string
      archivist_image_pull_policy:
        description: Pull policy override for Archivist node deployments
        required: false
        type: string
      archivist_contracts_image:
        description: Contracts image override
        required: false
        type: string
      archivist_contracts_image_pull_policy:
        description: Pull policy override for contracts deployments
        required: false
        type: string
      geth_docker_image:
        description: Geth image override
        required: false
        type: string
      geth_image_pull_policy:
        description: Pull policy override for geth deployments
        required: false
        type: string
      prometheus_docker_image:
        description: Prometheus image override
        required: false
        type: string
      prometheus_image_pull_policy:
        description: Pull policy override for Prometheus deployments
        required: false
        type: string
      archivist_discordbot_image:
        description: Discord bot image override
        required: false
        type: string
      archivist_discordbot_image_pull_policy:
        description: Pull policy override for Discord bot deployments
        required: false
        type: string
      archivist_rewarderbot_image:
        description: Rewarder bot image override
        required: false
        type: string
      archivist_rewarderbot_image_pull_policy:
        description: Pull policy override for rewarder bot deployments
        required: false
        type: string
      workflow_source:
        description: Workflow source
        required: false
        type: string
        default: ''
      namespace:
        description: Kubernetes namespace for test jobs
        required: false
        type: string
        default: 'devnet'
    secrets:
      KUBE_CONFIG:
        required: true

env:
  SOURCE: ${{ format('{0}/{1}', github.server_url, github.repository) }}
  BRANCH: ${{ github.ref_name }}
  RUNNER_IMAGE: durabilitylabs/cs-archivist-dist-tests:latest
  RUNNER_IMAGE_PULL_POLICY: Always
  IMAGE_PULL_POLICY: Always
  ARCHIVISTDOCKERIMAGE: durabilitylabs/archivist-node:latest-dist-tests
  ARCHIVIST_IMAGE_PULL_POLICY: ''
  ARCHIVIST_CONTRACTS_IMAGE: ''
  ARCHIVIST_CONTRACTS_IMAGE_PULL_POLICY: ''
  GETH_DOCKER_IMAGE: ''
  GETH_IMAGE_PULL_POLICY: ''
  PROMETHEUS_DOCKER_IMAGE: ''
  PROMETHEUS_IMAGE_PULL_POLICY: ''
  ARCHIVIST_DISCORDBOT_IMAGE: ''
  ARCHIVIST_DISCORDBOT_IMAGE_PULL_POLICY: ''
  ARCHIVIST_REWARDERBOT_IMAGE: ''
  ARCHIVIST_REWARDERBOT_IMAGE_PULL_POLICY: ''
  TEST_TYPE: release-tests
  NAMEPREFIX: r-tests
  NAMESPACE: ${{ inputs.namespace || 'devnet' }}
  JOB_MANIFEST: docker/job-release-tests.yaml
  COMMAND: dotnet test Tests/ArchivistReleaseTests
  KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
  KUBE_VERSION: v1.30.5


jobs:
  run_tests:
    name: Run Release Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.workflow_source }}

      - name: Variables
        run: |
          trim() {
            local value="$1"
            value="${value#"${value%%[![:space:]]*}"}"
            value="${value%"${value##*[![:space:]]}"}"
            printf '%s' "$value"
          }

          set_from_input() {
            local name="$1"
            local input_value
            input_value="$(trim "$2")"
            if [[ -n "${input_value}" ]]; then
              echo "${name}=${input_value}" >>"$GITHUB_ENV"
            else
              echo "${name}=$3" >>"$GITHUB_ENV"
            fi
          }

          RUNID=$(date +%Y%m%d-%H%M%S)
          echo "RUNID=${RUNID}" >> $GITHUB_ENV
          echo "TESTID=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          set_from_input SOURCE "${{ inputs.source }}" "${{ env.SOURCE }}"
          set_from_input BRANCH "${{ inputs.branch }}" "${{ env.BRANCH }}"
          set_from_input RUNNER_IMAGE "${{ inputs.runner_image }}" "${{ env.RUNNER_IMAGE }}"
          set_from_input RUNNER_IMAGE_PULL_POLICY "${{ inputs.runner_image_pull_policy }}" "${{ env.RUNNER_IMAGE_PULL_POLICY }}"
          set_from_input IMAGE_PULL_POLICY "${{ inputs.image_pull_policy }}" "${{ env.IMAGE_PULL_POLICY }}"
          set_from_input ARCHIVISTDOCKERIMAGE "${{ inputs.archivistdockerimage }}" "${{ env.ARCHIVISTDOCKERIMAGE }}"
          set_from_input ARCHIVIST_IMAGE_PULL_POLICY "${{ inputs.archivist_image_pull_policy }}" "${{ env.ARCHIVIST_IMAGE_PULL_POLICY }}"
          set_from_input ARCHIVIST_CONTRACTS_IMAGE "${{ inputs.archivist_contracts_image }}" "${{ env.ARCHIVIST_CONTRACTS_IMAGE }}"
          set_from_input ARCHIVIST_CONTRACTS_IMAGE_PULL_POLICY "${{ inputs.archivist_contracts_image_pull_policy }}" "${{ env.ARCHIVIST_CONTRACTS_IMAGE_PULL_POLICY }}"
          set_from_input GETH_DOCKER_IMAGE "${{ inputs.geth_docker_image }}" "${{ env.GETH_DOCKER_IMAGE }}"
          set_from_input GETH_IMAGE_PULL_POLICY "${{ inputs.geth_image_pull_policy }}" "${{ env.GETH_IMAGE_PULL_POLICY }}"
          set_from_input PROMETHEUS_DOCKER_IMAGE "${{ inputs.prometheus_docker_image }}" "${{ env.PROMETHEUS_DOCKER_IMAGE }}"
          set_from_input PROMETHEUS_IMAGE_PULL_POLICY "${{ inputs.prometheus_image_pull_policy }}" "${{ env.PROMETHEUS_IMAGE_PULL_POLICY }}"
          set_from_input ARCHIVIST_DISCORDBOT_IMAGE "${{ inputs.archivist_discordbot_image }}" "${{ env.ARCHIVIST_DISCORDBOT_IMAGE }}"
          set_from_input ARCHIVIST_DISCORDBOT_IMAGE_PULL_POLICY "${{ inputs.archivist_discordbot_image_pull_policy }}" "${{ env.ARCHIVIST_DISCORDBOT_IMAGE_PULL_POLICY }}"
          set_from_input ARCHIVIST_REWARDERBOT_IMAGE "${{ inputs.archivist_rewarderbot_image }}" "${{ env.ARCHIVIST_REWARDERBOT_IMAGE }}"
          set_from_input ARCHIVIST_REWARDERBOT_IMAGE_PULL_POLICY "${{ inputs.archivist_rewarderbot_image_pull_policy }}" "${{ env.ARCHIVIST_REWARDERBOT_IMAGE_PULL_POLICY }}"
          [[ -n "${{ inputs.nameprefix }}" ]] && NAMEPREFIX="`awk '{ print tolower($0) }' <<< ${{ inputs.nameprefix }}`" || NAMEPREFIX="`awk '{ print tolower($0) }' <<< ${{ env.NAMEPREFIX }}`"
          echo "NAMEPREFIX=${NAMEPREFIX}-${RUNID}" >>"$GITHUB_ENV"
          set_from_input NAMESPACE "${{ inputs.namespace }}" "${{ env.NAMESPACE }}"
          [[ -n "${{ inputs.command }}" ]] && COMMAND="${{ inputs.command }}" || COMMAND="${{ env.COMMAND }}"
          echo "COMMAND=$(jq -c 'split(" ")' <<< '"'${COMMAND}'"')" >>"$GITHUB_ENV"

      - name: Kubectl - Install ${{ env.KUBE_VERSION }}
        uses: azure/setup-kubectl@v4
        with:
          version: ${{ env.KUBE_VERSION }}

      - name: Kubectl - Kubeconfig
        run: |
          mkdir -p "${HOME}"/.kube
          echo "${{ env.KUBE_CONFIG }}" | base64 -d > "${HOME}"/.kube/config

      - name: Kubectl - Create Job to run tests
        run: |
          envsubst < ${{ env.JOB_MANIFEST }} | kubectl apply -f -

      - name: Tests Identification
        run: |
          echo "----"
          echo "Repository: ${{ env.SOURCE }}"
          echo "Branch: ${{ env.BRANCH }}"
          echo "Runner job: ${{ env.NAMEPREFIX }}"
          echo "Runner pod: $(kubectl get pod -n ${{ env.NAMESPACE }} --selector job-name=${{ env.NAMEPREFIX }} -ojsonpath='{.items[0].metadata.name}')"
          echo "Runner namespace: ${{ env.NAMESPACE }}"
          echo "----"

      - name: Show Runner logs
        run: |
          # Variables
          # We need more than 300 seconds because Auto Scaler may take 3 minutes to tun a node
          namespace="${{ env.NAMESPACE }}"
          pod=$(kubectl get pod -n ${{ env.NAMESPACE }} --selector job-name=${{ env.NAMEPREFIX }} -o jsonpath='{.items[0].metadata.name}')

          # Check Pod status
          WAIT=120
          SECONDS=0
          sleep=1
          while (( SECONDS < WAIT )); do
            phase=$(kubectl get pod ${pod} -n ${namespace} -o jsonpath='{.status.phase}')
            [[ "${phase}" == "Running" ]] && { echo "Pod $pod is in the $phase state - Get the logs"; break; } || { echo "Pod $pod is in the $phase state - Retry in $sleep second(s) / $((WAIT - SECONDS))"; }
            sleep $sleep
          done

          # Get logs
          while [[ $(kubectl get pod ${pod} -n ${namespace} -o jsonpath='{.status.phase}') == "Running" ]]; do
            echo "Show ${pod} logs ..."
            echo "----"
            kubectl logs $pod -n $namespace -f || true
            sleep 1
          done

      - name: Set workflow status from job status
        run: |
          sleep 5
          job_status=$(kubectl get jobs ${{ env.NAMEPREFIX }} -n ${{ env.NAMESPACE }} -o jsonpath='{.status.conditions[0].type}')
          echo "Job status: $job_status"
          if [[ "${job_status}" != "Complete" ]]; then exit 1; fi
